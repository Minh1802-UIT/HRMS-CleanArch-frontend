@if (confirmService.state()?.open) {
<div class="flex fixed inset-0 z-[9999] items-center justify-center page-enter">
  <div class="absolute inset-0 backdrop-blur-sm bg-zinc-900/50 dark:bg-black/60" (click)="cancel()"></div>
  <div class="relative bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-200 dark:border-zinc-700 p-6 w-full max-w-sm mx-4 dialog-card animate-scale-in">
    <div class="flex items-center justify-center w-14 h-14 rounded-2xl mx-auto mb-4" [ngClass]="iconBgClass">
      <i class="pi text-2xl" [ngClass]="confirmService.state()?.icon ?? iconClass"></i>
    </div>
    <h3 class="text-center text-lg font-bold text-zinc-900 dark:text-white mb-2">
      {{ confirmService.state()?.title ?? 'Confirm' }}
    </h3>
    <p class="text-center text-sm text-zinc-500 dark:text-zinc-400 mb-6 whitespace-pre-line">{{ confirmService.state()?.message }}</p>
    <div class="flex gap-3">
      <button (click)="cancel()"
        class="flex-1 py-2.5 text-sm font-bold text-zinc-600 dark:text-zinc-300 bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-xl transition-all hover:scale-[1.02]">
        {{ confirmService.state()?.cancelLabel ?? 'Cancel' }}
      </button>
      <button (click)="confirm()"
        class="flex-1 py-2.5 text-sm font-bold text-white rounded-xl transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 hover:scale-[1.02]"
        [ngClass]="confirmBtnClass">
        {{ confirmService.state()?.confirmLabel ?? 'Confirm' }}
      </button>
    </div>
  </div>
</div>
}
