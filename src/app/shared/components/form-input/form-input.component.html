<div [formGroup]="formGroup" class="relative">
  <label class="block mb-1.5 text-xs font-bold uppercase tracking-wider text-zinc-500 dark:text-zinc-400">
    {{ label }}
    @if (required) {
    <span class="text-red-500">*</span>
    }
  </label>

  <div class="relative">
    <input
      [formControlName]="controlName"
      [type]="type"
      [placeholder]="placeholder"
      [class.pr-10]="type === 'date'"
      class="w-full px-4 py-2.5 rounded-xl border bg-zinc-50 dark:bg-zinc-800 transition-all duration-200
        border-zinc-200 dark:border-zinc-700 text-zinc-900 dark:text-zinc-100
        placeholder-zinc-400 dark:placeholder-zinc-500
        focus:ring-2 focus:ring-violet-500/20 focus:border-violet-500 focus:outline-none
        hover:border-zinc-300 dark:hover:border-zinc-600
        disabled:opacity-50 disabled:cursor-not-allowed"
      [class.border-red-400]="showError"
      [class.dark:border-red-500]="showError"
    />
    @if (type === 'date') {
      <span class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 pointer-events-none">
        <span class="material-symbols-outlined text-xl">calendar_today</span>
      </span>
    }
  </div>

  @if (showError) {
    <small class="flex items-center gap-1 mt-1.5 text-xs text-red-500 animate-fade-in">
      <span class="material-symbols-outlined text-sm">error</span>
      {{ errorMessage }}
    </small>
  }
</div>
