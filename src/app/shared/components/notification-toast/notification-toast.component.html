<div class="fixed top-6 right-6 z-[10000] flex flex-col gap-3 w-80 pointer-events-none">
  @for (toast of toasts(); track trackById($index, toast)) {
  <div class="toast-item pointer-events-auto flex items-start gap-3 p-4 bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-100 dark:border-zinc-800 animate-slide-in-left"
    [ngClass]="'toast-' + toast.type">
    <div class="shrink-0 flex items-center justify-center w-10 h-10 rounded-xl" [ngClass]="{
      'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400': toast.type === 'success',
      'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400': toast.type === 'error',
      'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400': toast.type === 'info',
      'bg-amber-100 text-amber-600 dark:bg-amber-900/30 dark:text-amber-400': toast.type === 'warn'
    }">
      <i class="pi text-lg" [ngClass]="iconClass(toast.type)"></i>
    </div>
    <div class="flex-1 min-w-0">
      <p class="text-sm font-bold text-zinc-900 dark:text-white leading-snug">{{ toast.title }}</p>
      <p class="text-xs text-zinc-500 dark:text-zinc-400 mt-1 leading-relaxed">{{ toast.detail }}</p>
    </div>
    <button (click)="remove(toast.id)"
      class="shrink-0 mt-0.5 text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 transition-colors">
      <i class="pi pi-times text-xs"></i>
    </button>
  </div>
  }
</div>
