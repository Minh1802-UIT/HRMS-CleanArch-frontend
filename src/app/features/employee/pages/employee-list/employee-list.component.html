<div class="max-w-[1600px] mx-auto page-enter">
  <!-- Page Header -->
  <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4 animate-fade-in-up">
    <div>
      <p class="label-overline text-violet-500 mb-1">Workforce</p>
      <h1 class="text-2xl font-black tracking-tight text-zinc-900 dark:text-white">
        Employee Management
      </h1>
      <p class="text-zinc-500 dark:text-zinc-400 text-sm mt-1">
        Manage your team members, view profiles, and track employment details.
      </p>
    </div>
    <button
      (click)="onAddEmployee()"
      class="flex gap-2 items-center px-5 py-2.5 text-sm font-bold text-white rounded-xl shadow-lg transition-all bg-violet-600 hover:bg-violet-500 shadow-violet-600/25 btn-glow whitespace-nowrap"
    >
      <span class="text-lg material-symbols-outlined">add_circle</span>
      Add Employee
    </button>
  </div>

  <!-- Sub-navigation tabs -->
  <div class="flex space-x-6 mb-8 border-b border-zinc-200 dark:border-zinc-800 overflow-x-auto">
    <a
      routerLink="/employees"
      routerLinkActive="border-violet-600 text-violet-600"
      [routerLinkActiveOptions]="{ exact: true }"
      class="px-1 pb-3 text-xs font-bold tracking-widest uppercase border-b-2 border-transparent text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 hover:border-zinc-300 transition-all cursor-pointer"
      >Team Members</a
    >
    <a
      routerLink="/directory"
      routerLinkActive="border-violet-600 text-violet-600"
      [routerLinkActiveOptions]="{ exact: true }"
      class="px-1 pb-3 text-xs font-bold tracking-widest uppercase border-b-2 border-transparent text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 hover:border-zinc-300 transition-all cursor-pointer"
      >Directory</a
    >
    <a
      routerLink="/org-chart"
      routerLinkActive="border-violet-600 text-violet-600"
      [routerLinkActiveOptions]="{ exact: true }"
      class="px-1 pb-3 text-xs font-bold tracking-widest uppercase border-b-2 border-transparent text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 hover:border-zinc-300 transition-all cursor-pointer"
      >Org Chart</a
    >
  </div>

  <!-- Filters Component -->
  <app-employee-filters
    [(searchTerm)]="searchTerm"
    (searchInput)="onSearchInput()"
    (search)="onSearch()"
    (clear)="clearFilters()"
    (exportCsv)="exportEmployeesCsv()"
  ></app-employee-filters>

  <!-- Employee Table -->
  <div class="overflow-hidden rounded-2xl glass-panel">
    @if (loading) {
      <div class="overflow-x-auto" aria-busy="true" aria-label="Loading employees">
        <table class="min-w-full">
          <thead class="bg-zinc-50/80 dark:bg-zinc-900/60 border-b border-zinc-100 dark:border-zinc-800">
            <tr>
              <th scope="col" class="px-6 py-3.5 label-overline text-left text-zinc-500 dark:text-zinc-400">Employee</th>
              <th scope="col" class="px-6 py-3.5 label-overline text-left text-zinc-500 dark:text-zinc-400">ID</th>
              <th scope="col" class="px-6 py-3.5 label-overline text-left text-zinc-500 dark:text-zinc-400">Job Title</th>
              <th scope="col" class="px-6 py-3.5 label-overline text-left text-zinc-500 dark:text-zinc-400">Department</th>
              <th scope="col" class="px-6 py-3.5 label-overline text-left text-zinc-500 dark:text-zinc-400">Type</th>
              <th scope="col" class="px-6 py-3.5 label-overline text-left text-zinc-500 dark:text-zinc-400">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-zinc-100 dark:divide-zinc-800">
            @for (i of [1,2,3,4,5,6,7,8]; track i) {
              <tr>
                <td class="px-6 py-4">
                  <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full skeleton flex-shrink-0"></div>
                    <div class="w-32 h-4 skeleton"></div>
                  </div>
                </td>
                <td class="px-6 py-4"><div class="w-16 h-4 skeleton rounded"></div></td>
                <td class="px-6 py-4"><div class="w-28 h-4 skeleton"></div></td>
                <td class="px-6 py-4"><div class="w-24 h-4 skeleton"></div></td>
                <td class="px-6 py-4"><div class="w-20 h-5 skeleton rounded-full"></div></td>
                <td class="px-6 py-4"><div class="w-12 h-4 skeleton"></div></td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }

    @if (!loading) {
      <app-employee-table
        [employees]="paginatedEmployees"
        [deptMap]="deptMap"
        [posMap]="posMap"
        (prefetch)="prefetchEmployee($event)"
      ></app-employee-table>
    }
  </div>

  <!-- Pagination -->
  <app-employee-pagination
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    [totalItems]="totalItems"
    [totalPages]="totalPages"
    (goToPage)="goToPage($event)"
  ></app-employee-pagination>

</div>

  <!-- Edit/Add Employee Drawer -->
  @if (showEditDrawer) {
    <div class="flex fixed inset-0 z-50 justify-end items-center">
      <div
        class="absolute inset-0 backdrop-blur-sm transition-opacity bg-zinc-900/50"
        (click)="closeEditDrawer()"
      ></div>
      <div
        class="overflow-hidden relative w-full max-w-4xl h-full bg-white border-l border-zinc-200 shadow-2xl dark:bg-zinc-900 dark:border-zinc-800"
      >
        <app-add-employee
          [employeeId]="selectedEmployeeId"
          (close)="closeEditDrawer()"
          (employeeAdded)="onEmployeeSaved()"
        ></app-add-employee>
      </div>
    </div>
  }
