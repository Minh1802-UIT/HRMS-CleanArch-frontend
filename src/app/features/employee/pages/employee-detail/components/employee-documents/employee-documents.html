<div class="p-6 bg-white dark:bg-zinc-800 rounded-lg border border-zinc-200 dark:border-zinc-700 shadow-sm">
    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
        <!-- Resume -->
        <div
            class="flex gap-4 items-start p-4 rounded-lg border border-gray-200 dark:border-zinc-700 transition-shadow hover:shadow-md">
            <div class="p-3 text-2xl text-red-500 bg-red-50 dark:bg-red-900/20 rounded">
                <i class="fas fa-file-pdf"></i>
            </div>
            <div class="flex-1 min-w-0">
                <h4 class="font-medium text-zinc-800 dark:text-zinc-200 truncate">Resume / CV</h4>
                <p class="mt-1 text-xs text-zinc-500">
                    {{ getDocName(employee.jobDetails?.resumeUrl) }}
                </p>
                <div class="flex gap-2 mt-2">
                    @if (employee.jobDetails?.resumeUrl) {
                    <button (click)="downloadDoc(employee.jobDetails!.resumeUrl!)"
                        class="text-xs font-medium text-blue-600 dark:text-blue-400 hover:underline">
                        View File
                    </button>
                    }
                    <button (click)="resumeInput.click()"
                        class="text-xs font-medium text-zinc-500 dark:text-zinc-400 hover:text-blue-600 dark:hover:text-blue-400">
                        {{ employee.jobDetails?.resumeUrl ? "Change" : "Upload" }}
                    </button>
                </div>
                <input #resumeInput type="file" class="hidden" (change)="onDocSelected($event, 'resume')"
                    accept=".pdf,.doc,.docx" />
            </div>
            @if (isUploadingDoc && resumeInput.value) {
            <div class="animate-spin text-zinc-400">
                <i class="fas fa-spinner"></i>
            </div>
            }
        </div>
        <!-- Contract Document -->
        <div
            class="flex gap-4 items-start p-4 rounded-lg border border-gray-200 dark:border-zinc-700 transition-shadow hover:shadow-md">
            <div class="p-3 text-2xl text-blue-500 bg-blue-50 dark:bg-blue-900/20 rounded">
                <i class="fas fa-file-contract"></i>
            </div>
            <div class="flex-1 min-w-0">
                <h4 class="font-medium text-zinc-800 dark:text-zinc-200 truncate">Signed Contract</h4>
                <p class="mt-1 text-xs text-zinc-500">
                    {{ getDocName(employee.jobDetails?.contractUrl) }}
                </p>
                <div class="flex gap-2 mt-2">
                    @if (employee.jobDetails?.contractUrl) {
                    <button (click)="downloadDoc(employee.jobDetails!.contractUrl!)"
                        class="text-xs font-medium text-blue-600 dark:text-blue-400 hover:underline">
                        View File
                    </button>
                    }
                    <button (click)="contractInput.click()"
                        class="text-xs font-medium text-zinc-500 dark:text-zinc-400 hover:text-blue-600 dark:hover:text-blue-400">
                        {{ employee.jobDetails?.contractUrl ? "Change" : "Upload" }}
                    </button>
                </div>
                <input #contractInput type="file" class="hidden" (change)="onDocSelected($event, 'contract')"
                    accept=".pdf" />
            </div>
        </div>
    </div>
</div>
