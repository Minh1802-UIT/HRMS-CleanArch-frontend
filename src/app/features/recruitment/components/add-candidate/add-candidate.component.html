<div class="flex flex-col h-full bg-white dark:bg-zinc-900 overflow-hidden relative rounded-xl shadow-2xl">
  <!-- Header -->
  <div class="flex sticky top-0 z-20 justify-between items-center px-8 py-6 bg-white dark:bg-zinc-900 border-b border-gray-100 dark:border-zinc-800">
    <div>
      <h2 class="text-2xl font-bold text-gray-900 dark:text-zinc-100">
        {{ isEditMode ? "Edit Candidate" : "Add New Candidate" }}
      </h2>
      <p class="mt-1 text-sm text-gray-500 dark:text-zinc-400">
        {{ isEditMode ? "Update the applicant's details." : "Add a new applicant to the recruitment pipeline." }}
      </p>
    </div>
    <button (click)="close.emit()" class="text-gray-400 focus:outline-none dark:text-zinc-500 transition-colors hover:text-gray-600 dark:hover:text-zinc-200">
      <span class="text-2xl material-symbols-outlined">close</span>
    </button>
  </div>

  <!-- Form -->
  <div class="overflow-y-auto flex-1 bg-white dark:bg-zinc-900">
    <div class="px-8 py-10 mx-auto max-w-4xl">
      <form [formGroup]="candidateForm" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2 col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Full Name <span class="text-red-500">*</span></label>
            <input type="text" formControlName="fullName" class="form-input w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all" placeholder="John Doe" />
          </div>

          <div class="space-y-2 col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Email <span class="text-red-500">*</span></label>
            <input type="email" formControlName="email" class="form-input w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all" placeholder="john@example.com" />
          </div>

          <div class="space-y-2 col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Phone <span class="text-red-500">*</span></label>
            <input type="text" formControlName="phone" class="form-input w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all" placeholder="+1 234 567 8900" />
          </div>

          <div class="space-y-2 col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Applied Date <span class="text-red-500">*</span></label>
            <input type="date" formControlName="appliedDate" class="form-input w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all" />
          </div>

          <div class="space-y-2 col-span-2">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Job Vacancy <span class="text-red-500">*</span></label>
            <select formControlName="jobVacancyId" class="form-select w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all cursor-pointer">
              <option value="" disabled>Select a job vacancy...</option>
              <option *ngFor="let job of jobs" [value]="job.id">{{ job.title }}</option>
            </select>
          </div>

          <div class="space-y-2 col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Status <span class="text-red-500">*</span></label>
            <select formControlName="status" class="form-select w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all cursor-pointer">
              <option *ngFor="let stat of statuses" [value]="stat">{{ stat }}</option>
            </select>
          </div>

          <div class="space-y-2 col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Resume/CV URL <span class="text-red-500">*</span></label>
            <input type="url" formControlName="resumeUrl" class="form-input w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all" placeholder="https://drive.google.com/..." />
          </div>

          <div class="space-y-2 col-span-2">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Experience</label>
            <textarea formControlName="experience" rows="3" class="form-input w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all" placeholder="One experience per line..."></textarea>
          </div>

          <div class="space-y-2 col-span-2">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Education</label>
            <textarea formControlName="education" rows="3" class="form-input w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all" placeholder="One education per line..."></textarea>
          </div>

          <div class="space-y-2 col-span-2">
            <label class="block text-sm font-semibold text-zinc-900 dark:text-zinc-100">Notes</label>
            <textarea formControlName="notes" rows="3" class="form-input w-full px-4 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all" placeholder="Internal notes about this candidate..."></textarea>
          </div>
        </div>

      </form>
    </div>
  </div>

  <!-- Footer Actions -->
  <div class="flex sticky bottom-0 z-20 justify-end items-center px-8 py-6 gap-4 bg-white dark:bg-zinc-900 border-t border-gray-100 dark:border-zinc-800">
    <button type="button" (click)="close.emit()" class="px-6 py-2.5 text-sm font-semibold text-gray-700 dark:text-zinc-300 bg-white dark:bg-zinc-800 rounded-lg border border-gray-300 dark:border-zinc-600 transition-colors hover:bg-gray-50 dark:hover:bg-zinc-700">
      Cancel
    </button>
    <button type="button" (click)="onSubmit()" [disabled]="candidateForm.invalid || loading" class="flex gap-2 items-center px-8 py-2.5 text-sm font-semibold text-white bg-violet-600 rounded-lg shadow-sm transition-colors hover:bg-violet-700 disabled:opacity-50 disabled:cursor-not-allowed">
      <span *ngIf="loading" class="material-symbols-outlined animate-spin text-sm">sync</span>
      {{ isEditMode ? "Save Changes" : "Add Candidate" }}
    </button>
  </div>
</div>
