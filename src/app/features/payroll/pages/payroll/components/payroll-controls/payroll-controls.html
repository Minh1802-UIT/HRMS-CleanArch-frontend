<div class="flex flex-col gap-4 justify-between items-start mb-6 md:flex-row md:items-center">
    <!-- Filters -->
    <div class="flex flex-wrap gap-4 items-center">
        <div class="relative w-full md:w-64">
            <span class="absolute top-3 left-3 text-zinc-400 material-symbols-outlined">search</span>
            <input type="text" [value]="searchKeyword" (input)="onSearchInput($event)" placeholder="Search employee..."
                class="py-2 pr-4 pl-10 w-full bg-white dark:bg-zinc-800 rounded-lg border border-zinc-200 dark:border-zinc-700 focus:outline-none focus:ring-2 focus:ring-violet-500 text-zinc-800 dark:text-zinc-200" />
        </div>

        <div class="flex gap-2 items-center">
            <select [value]="selectedMonth" (change)="onMonthChange($event)"
                class="pl-4 pr-10 py-2 bg-white dark:bg-zinc-800 rounded-lg border border-zinc-200 dark:border-zinc-700 outline-none focus:ring-2 focus:ring-violet-500 text-zinc-800 dark:text-zinc-200 shadow-sm">
                @for (m of months; track m.value) {
                <option [value]="m.value">{{ m.label }}</option>
                }
            </select>

            <select [value]="selectedYear" (change)="onYearChange($event)"
                class="pl-4 pr-10 py-2 bg-white dark:bg-zinc-800 rounded-lg border border-zinc-200 dark:border-zinc-700 outline-none focus:ring-2 focus:ring-violet-500 text-zinc-800 dark:text-zinc-200 shadow-sm">
                @for (year of years; track year) {
                <option [value]="year">{{ year }}</option>
                }
            </select>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-wrap gap-3">
        <button (click)="calculate.emit()" [disabled]="calculating"
            class="px-4 py-2 font-medium text-white bg-violet-600 rounded-lg shadow-sm transition-colors hover:bg-violet-700 disabled:opacity-50">
            @if (calculating) {
            <span class="mr-2 material-symbols-outlined animate-spin">progress_activity</span> Calculating...
            } @else {
            <span class="mr-2 material-symbols-outlined">calculate</span> Run Calculation
            }
        </button>
        <div class="relative group">
            <button
                class="px-4 py-2 font-medium text-zinc-700 bg-white dark:bg-zinc-800 dark:text-zinc-200 rounded-lg border border-zinc-200 dark:border-zinc-700 shadow-sm transition-colors hover:bg-zinc-50 dark:hover:bg-zinc-700">
                <span class="mr-2 material-symbols-outlined">download</span> Export Options
            </button>
            <!-- Dropdown -->
            <div class="absolute right-0 z-10 hidden pt-2 w-48 group-hover:block">
                <div
                    class="py-1 bg-white dark:bg-zinc-800 rounded-lg border border-zinc-200 dark:border-zinc-700 shadow-lg">
                    <button (click)="exportCsv.emit()"
                        class="block px-4 py-2 w-full text-sm text-left text-zinc-700 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-700">
                        <span class="mr-2 text-emerald-600 material-symbols-outlined">dataset</span> Export CSV
                    </button>
                    <button (click)="exportExcel.emit()"
                        class="block px-4 py-2 w-full text-sm text-left text-zinc-700 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-700">
                        <span class="mr-2 text-green-600 material-symbols-outlined">table_chart_view</span> Export Excel
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
