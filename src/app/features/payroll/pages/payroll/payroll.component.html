<div class="p-6 h-full bg-zinc-50 dark:bg-zinc-900 md:p-8">
  <div class="mx-auto max-w-7xl">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-zinc-900 dark:text-zinc-100">Payroll Management</h1>
      <p class="mt-2 text-zinc-500">Calculate, review, and finalize employee salaries</p>
    </div>

    <app-payroll-summary [totalNetSalary]="totalNetSalary" [totalEmployees]="payrollRecords.length"
      [titlePeriod]="titlePeriod">
    </app-payroll-summary>

    <div class="p-6 bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700 shadow-sm">
      <app-payroll-controls [selectedMonth]="selectedMonth" [selectedYear]="selectedYear"
        [searchKeyword]="searchKeyword" [calculating]="calculating" [months]="months" [years]="years"
        (monthChange)="onMonthChange($event)" (yearChange)="onYearChange($event)"
        (searchChange)="onSearchChange($event)" (calculate)="runCalculation()" (exportCsv)="exportCsv()"
        (exportExcel)="exportExcel()">
      </app-payroll-controls>

      <app-payroll-table [records]="payrollRecords" [loading]="loading" [searchKeyword]="searchKeyword"
        [markingPaidId]="markingPaidId" [calculationTemplate]="calculationHoverTpl" (markAsPaid)="markAsPaid($event)"
        (downloadPdf)="downloadPdf($event)">
      </app-payroll-table>
    </div>
  </div>
</div>

<!-- Template for displaying breakdown on hover inside table -->
<ng-template #calculationHoverTpl let-items="allowances">
  <ul class="text-zinc-300">
    <li *ngFor="let item of items | keyvalue" class="flex justify-between py-1 border-b border-zinc-700 last:border-0">
      <span class="capitalize">{{ $any(item.key).replace("Allowance", "").replace("Deduction", "") }}</span>
      <span class="font-mono">{{ $any(item.value) | currency:'VND':'symbol-narrow':'1.0-0' }}</span>
    </li>
    <li *ngIf="!items || (items | keyvalue).length === 0" class="py-1 text-center opacity-50">
      None
    </li>
  </ul>
</ng-template>
