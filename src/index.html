<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>ZenithHR</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--
      Content-Security-Policy.

      IMPORTANT: This static CSP is a FALLBACK placeholder only.
      The CspService (app.component.ts) applies the environment-specific CSP
      from environment.ts / environment.production.ts at runtime, overriding
      this tag.  Both environments must be kept in sync with this fallback.

      - Development: localhost URLs + http://localhost:5055
      - Production: live domains (vercel.app, onrender.com, unsplash, pravatar)

      frame-ancestors cannot be set via meta tag; configure it in the web
      server / reverse proxy for full coverage.
    -->
  <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://vercel.live;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data: https://*.vercel.app;
        img-src 'self' data: blob: https: https://images.unsplash.com https://i.pravatar.cc https://upload.wikimedia.org https://*.supabase.co https://*.onrender.com;
        connect-src 'self' http://localhost:5055 https://localhost:5055 https://hrms-backend-api-n0bq.onrender.com https://*.onrender.com https://vercel.live https://*.vercel.app;
        worker-src 'self' blob:;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      " />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
  <link rel="dns-prefetch" href="https://images.unsplash.com" />
  <link rel="preconnect" href="https://i.pravatar.cc" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <!-- Material Symbols: loaded async to not block landing page -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    media="print" onload="this.media='all'" />
  <link id="theme-css" rel="stylesheet" type="text/css" href="assets/themes/lara-light-indigo/theme.css"
    data-ng-bypass />
</head>

<body>
  <app-root></app-root>
</body>

</html>
